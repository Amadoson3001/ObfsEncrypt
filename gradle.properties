# Gradle configuration optimizations
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
android.disallowKotlinSourceSets=false

# Enable Configuration Cache for much faster builds
org.gradle.configuration-cache=true
# Allow Gradle to run multiple tasks in parallel for better CPU utilization
org.gradle.parallel=true
# Reuse build outputs from previous builds
org.gradle.caching=true
# Keep the Gradle daemon around for speed
org.gradle.daemon=true
# Provide more meaningful build output colors
org.gradle.console=rich